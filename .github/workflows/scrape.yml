name: DTRH Resale Tracker

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright
      - run: playwright install chromium --with-deps
      - run: python dtrh_scraper.py
      - run: |
          git config user.name "DTRH Bot"
          git config user.email "bot@users.noreply.github.com"
          cp dtrh_dashboard.html index.html
          git add dtrh_resale_data.csv dtrh_dashboard.html index.html
          git diff --staged --quiet || git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
